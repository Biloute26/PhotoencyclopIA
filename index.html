<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhotoencyclopIA</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #0d1f0f; color: #f5f0e8; padding: 16px; max-width: 500px; margin: 0 auto; }
h1 { font-size: 22px; color: #c8e6c9; margin-bottom: 20px; }
h1 b { color: #4caf52; }
#preview { width: 100%; border-radius: 12px; display: none; margin-bottom: 12px; }
input[type=file] { display: block; width: 100%; padding: 16px; background: #1a3a1d; border: 2px dashed #4caf52; border-radius: 12px; color: #4caf52; font-size: 15px; margin-bottom: 12px; cursor: pointer; }
#analyze { display: none; width: 100%; padding: 16px; background: #4caf52; border: none; border-radius: 12px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 12px; }
#reset { display: none; width: 100%; padding: 14px; background: #1a3a1d; border: 1px solid #4caf52; border-radius: 12px; color: #4caf52; font-size: 15px; cursor: pointer; margin-bottom: 12px; }
#status { font-size: 14px; color: #a8c5aa; margin-bottom: 12px; min-height: 20px; }
#result { display: none; }
.card { background: #1a3a1d; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
.card h3 { font-size: 12px; text-transform: uppercase; color: #4caf52; margin-bottom: 8px; letter-spacing: 1px; }
.card p, .card li { font-size: 14px; line-height: 1.7; }
.card ul { padding-left: 18px; }
.name { font-size: 26px; font-weight: bold; margin-bottom: 4px; }
.cat { font-size: 12px; color: #4caf52; text-transform: uppercase; letter-spacing: 1px; }
.latin { font-size: 13px; color: #a8c5aa; font-style: italic; margin-bottom: 14px; }
</style>
</head>
<body>

<h1>Photo<b>encyclop</b>IA</h1>
<img id="preview">
<input type="file" id="fileinput" accept="image/*">
<button id="analyze">🔍 Analyser</button>
<button id="reset">📷 Nouvelle photo</button>
<p id="status">Choisis une photo ci-dessus</p>
<div id="result"></div>

<script>
var b64 = '', mime = 'image/jpeg';

document.getElementById('fileinput').onchange = function() {
  var file = this.files[0];
  if (!file) return;
  mime = file.type || 'image/jpeg';
  var r = new FileReader();
  r.onload = function(e) {
    b64 = e.target.result.split(',')[1];
    document.getElementById('preview').src = e.target.result;
    document.getElementById('preview').style.display = 'block';
    document.getElementById('analyze').style.display = 'block';
    document.getElementById('status').textContent = 'Photo prête — appuie sur Analyser !';
    document.getElementById('result').style.display = 'none';
    document.getElementById('reset').style.display = 'none';
  };
  r.readAsDataURL(file);
};

document.getElementById('analyze').onclick = function() {
  if (!b64) return;
  this.disabled = true;
  document.getElementById('status').textContent = 'Analyse en cours…';
  document.getElementById('result').style.display = 'none';
  var prompt = 'Analyse cette photo. Retourne UNIQUEMENT du JSON valide, rien d\'autre.\n{"emoji":"🔍","categorie":"type","nom":"nom","nom_latin":"sci","description":"3 phrases","analyse":"3 phrases sur cette photo","conseils":["1","2","3"],"le_saviez_vous":"fait","recette_ou_usage":"usage"}';
  var models = ['meta-llama/llama-4-maverick:free','qwen/qwen2.5-vl-32b-instruct:free','mistralai/mistral-small-3.1-24b-instruct:free'];
  function tryNext(i) {
    if (i >= models.length) { document.getElementById('status').textContent = 'Aucun modèle dispo, réessaie.'; document.getElementById('analyze').disabled = false; return; }
    document.getElementById('status').textContent = 'Modèle ' + (i+1) + '/' + models.length + '…';
    fetch('https://photoencyclopia-proxy.widehem-olivier.workers.dev', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ model: models[i], messages:[{role:'user',content:[{type:'text',text:prompt},{type:'image_url',image_url:{url:'data:'+mime+';base64,'+b64}}]}], max_tokens:700, temperature:0.1 }) })
    .then(function(r){return r.json();}).then(function(d){
      var raw = d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content||'';
      if (!raw) { tryNext(i+1); return; }
      raw = raw.replace(/```json/g,'').replace(/```/g,'').trim();
      var m = raw.match(/\{[\s\S]*\}/); if(m) raw=m[0];
      try { showResult(JSON.parse(raw)); } catch(e) { document.getElementById('status').textContent='Réponse inattendue, réessaie.'; document.getElementById('analyze').disabled=false; }
    }).catch(function(){ tryNext(i+1); });
  }
  tryNext(0);
};

function showResult(f) {
  document.getElementById('status').textContent = '';
  document.getElementById('analyze').style.display = 'none';
  document.getElementById('reset').style.display = 'block';
  var h = '<div style="font-size:48px;margin-bottom:8px">'+(f.emoji||'🔍')+'</div>';
  h += '<div class="cat">'+e(f.categorie)+'</div><div class="name">'+e(f.nom)+'</div>';
  if(f.nom_latin) h+='<div class="latin">'+e(f.nom_latin)+'</div>';
  h += '<div class="card"><h3>📖 Description</h3><p>'+e(f.description)+'</p></div>';
  h += '<div class="card"><h3>🔬 Ce que je vois</h3><p>'+e(f.analyse)+'</p></div>';
  if(f.conseils&&f.conseils.length){h+='<div class="card"><h3>💡 Conseils</h3><ul>';f.conseils.forEach(function(c){h+='<li>'+e(c)+'</li>';});h+='</ul></div>';}
  if(f.le_saviez_vous) h+='<div class="card"><h3>🌟 Le saviez-vous ?</h3><p>'+e(f.le_saviez_vous)+'</p></div>';
  if(f.recette_ou_usage) h+='<div class="card"><h3>🍽 Recette & Usage</h3><p>'+e(f.recette_ou_usage)+'</p></div>';
  document.getElementById('result').innerHTML=h;
  document.getElementById('result').style.display='block';
  document.getElementById('analyze').disabled=false;
}

document.getElementById('reset').onclick = function() {
  b64=''; document.getElementById('fileinput').value='';
  document.getElementById('preview').style.display='none';
  document.getElementById('analyze').style.display='none';
  document.getElementById('reset').style.display='none';
  document.getElementById('result').style.display='none';
  document.getElementById('status').textContent='Choisis une photo ci-dessus';
};

function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
</script>
</body>
</html>
