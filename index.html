<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1f0f">
<title>PhotoencyclopIA</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green-dark: #0d1f0f; --green-mid: #1a3a1d; --green-accent: #2d6a31;
  --green-light: #4caf52; --cream: #f5f0e8; --amber: #e8a020;
  --text-muted: #a8c5aa;
}
body { font-family: "DM Sans", sans-serif; background: var(--green-dark); color: var(--cream); min-height: 100vh; }
header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.08); }
.logo { font-family: "Playfair Display", serif; font-size: 20px; color: #c8e6c9; }
.logo span { color: var(--green-light); }

/* CAPTURE */
.capture-wrap { padding: 20px; }
.capture-zone {
  background: var(--green-mid);
  border: 2px dashed rgba(76,175,82,0.4);
  border-radius: 20px;
  min-height: 200px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 30px 20px;
  cursor: pointer; position: relative; overflow: hidden;
  transition: border-color 0.2s;
}
.capture-zone:hover { border-color: var(--green-light); }
.capture-zone.has-image { padding: 0; border-style: solid; border-color: var(--green-accent); }
.capture-icon { font-size: 48px; margin-bottom: 12px; }
.capture-title { font-family: "Playfair Display", serif; font-size: 18px; margin-bottom: 6px; }
.capture-sub { font-size: 13px; color: var(--text-muted); }
.preview-img { width: 100%; max-height: 280px; object-fit: cover; border-radius: 18px; display: block; }
.change-btn {
  position: absolute; bottom: 10px; right: 10px;
  background: rgba(0,0,0,0.6); color: white; border: 1px solid rgba(255,255,255,0.2);
  border-radius: 16px; padding: 5px 12px; font-size: 12px; cursor: pointer;
}

/* BUTTONS */
.actions { display: none; padding: 0 20px 16px; gap: 10px; }
.actions.show { display: flex; }
.btn-analyze {
  flex: 1; background: linear-gradient(135deg, var(--green-accent), var(--green-light));
  border: none; border-radius: 14px; color: white;
  font-size: 16px; font-weight: 500; padding: 15px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  font-family: "DM Sans", sans-serif;
}
.btn-analyze:disabled { opacity: 0.5; }
.btn-retry {
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 14px; color: var(--cream); font-size: 20px;
  padding: 15px 18px; cursor: pointer;
}

/* LOADING */
.loading { display: none; padding: 40px 20px; text-align: center; }
.loading.show { display: block; }
.spinner {
  width: 44px; height: 44px; border: 3px solid rgba(76,175,82,0.2);
  border-top-color: var(--green-light); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-family: "Playfair Display", serif; font-size: 17px; }
.loading-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

/* RESULT */
.result { display: none; padding: 0 20px 20px; }
.result.show { display: block; }
.result-header { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 16px; }
.result-emoji { font-size: 42px; flex-shrink: 0; }
.result-cat { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--green-light); font-weight: 500; }
.result-name { font-family: "Playfair Display", serif; font-size: 24px; line-height: 1.2; }
.result-latin { font-size: 13px; color: var(--text-muted); font-style: italic; }
.pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.pill {
  background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px; padding: 5px 12px; font-size: 12px;
  display: flex; align-items: center; gap: 5px;
}
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-light); flex-shrink: 0; }
.dot.amber { background: var(--amber); }
.dot.red { background: #f44336; }
.card {
  background: var(--green-mid); border-radius: 14px; padding: 16px;
  margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.06);
}
.card-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--green-light); font-weight: 500; margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.card-text { font-size: 14px; line-height: 1.7; }
.tips { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.tips li { display: flex; gap: 8px; font-size: 14px; line-height: 1.6; }
.tip-n {
  width: 20px; height: 20px; background: rgba(76,175,82,0.2);
  border-radius: 50%; flex-shrink: 0; display: flex;
  align-items: center; justify-content: center; font-size: 10px;
  color: var(--green-light); margin-top: 2px;
}
.recipe-card {
  background: linear-gradient(135deg, rgba(232,160,32,0.12), rgba(232,160,32,0.04));
  border: 1px solid rgba(232,160,32,0.2); border-radius: 14px;
  padding: 16px; margin-bottom: 12px;
}
.recipe-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--amber); font-weight: 500; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }

/* ERROR */
.error { display: none; padding: 20px; text-align: center; }
.error.show { display: block; }
.error-box { background: rgba(244,67,54,0.1); border: 1px solid rgba(244,67,54,0.3); border-radius: 14px; padding: 20px; }
.error-text { font-size: 14px; color: #ff8a80; line-height: 1.6; margin-top: 8px; }

.btn-new {
  width: calc(100% - 40px); margin: 0 20px 20px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px; color: var(--text-muted); font-size: 14px;
  padding: 13px; cursor: pointer; font-family: "DM Sans", sans-serif;
}
footer { text-align: center; padding: 16px; font-size: 11px; color: rgba(255,255,255,0.2); }
</style>
</head>
<body>

<header>
  <div class="logo">Photo<span>encyclop</span>IA</div>
</header>

<div class="capture-wrap">
  <div class="capture-zone" id="captureZone">
    <div class="capture-icon">📷</div>
    <div class="capture-title">Prends ou importe une photo</div>
    <div class="capture-sub">Plante, animal, objet, aliment, monument…<br>J'analyse tout !</div>
  </div>
</div>
<input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none">

<div class="actions" id="actions">
  <button class="btn-retry" id="retryBtn" title="Autre photo">🔄</button>
  <button class="btn-analyze" id="analyzeBtn">🔍 Analyser</button>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Analyse en cours…</div>
  <div class="loading-sub" id="loadingSub">Identification de l'objet</div>
</div>

<div class="error" id="error">
  <div class="error-box">
    <div style="font-size:32px">😕</div>
    <div class="error-text" id="errorText"></div>
  </div>
</div>

<div class="result" id="result"></div>
<button class="btn-new" id="newBtn" style="display:none">📸 Analyser une nouvelle photo</button>

<footer>PhotoencyclopIA — Propulsé par OpenRouter</footer>

<script>
const PROXY = "https://photoencyclopia-proxy.widehem-olivier.workers.dev";
const MODELS = [
  "meta-llama/llama-4-maverick:free",
  "qwen/qwen2.5-vl-32b-instruct:free",
  "mistralai/mistral-small-3.1-24b-instruct:free",
  "google/gemma-3-27b-it:free"
];

let imageB64 = "", imageMime = "image/jpeg";

const captureZone = document.getElementById("captureZone");
const fileInput = document.getElementById("fileInput");
const actions = document.getElementById("actions");
const analyzeBtn = document.getElementById("analyzeBtn");
const retryBtn = document.getElementById("retryBtn");
const loading = document.getElementById("loading");
const loadingSub = document.getElementById("loadingSub");
const result = document.getElementById("result");
const error = document.getElementById("error");
const errorText = document.getElementById("errorText");
const newBtn = document.getElementById("newBtn");

// PHOTO CAPTURE
captureZone.addEventListener("click", () => fileInput.click());
retryBtn.addEventListener("click", () => fileInput.click());
newBtn.addEventListener("click", resetAll);

fileInput.addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  imageMime = file.type || "image/jpeg";
  const reader = new FileReader();
  reader.onload = ev => {
    imageB64 = ev.target.result.split(",")[1];
    showPreview(ev.target.result);
  };
  reader.readAsDataURL(file);
});

function showPreview(src) {
  captureZone.innerHTML = `<img class="preview-img" src="${src}"><button class="change-btn" id="changeBtn">Changer</button>`;
  captureZone.classList.add("has-image");
  document.getElementById("changeBtn").addEventListener("click", e => {
    e.stopPropagation(); fileInput.click();
  });
  actions.classList.add("show");
  hideAll();
}

// ANALYZE
analyzeBtn.addEventListener("click", analyze);

async function analyze() {
  if (!imageB64) return;
  hideAll();
  loading.classList.add("show");
  analyzeBtn.disabled = true;

  const prompt = `Tu es une encyclopédie visuelle. Analyse cette photo et retourne UNIQUEMENT un objet JSON valide, sans texte avant ou après.
{"emoji":"emoji","categorie":"type précis","nom":"nom commun","nom_latin":"nom sci ou marque","statut":[{"label":"info 1","couleur":"vert"},{"label":"info 2","couleur":"amber"}],"description":"3 phrases précises","analyse":"3 phrases sur cette photo","conseils":["conseil 1","conseil 2","conseil 3"],"le_saviez_vous":"fait rare","recette_ou_usage":"usage pratique adapté"}`;

  let raw = "", lastErr = "";
  for (const model of MODELS) {
    try {
      loadingSub.textContent = "Essai " + model.split("/")[1].split(":")[0] + "…";
      const resp = await fetch(PROXY, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model,
          messages: [{ role: "user", content: [
            { type: "text", text: prompt },
            { type: "image_url", image_url: { url: `data:${imageMime};base64,${imageB64}` } }
          ]}],
          max_tokens: 800,
          temperature: 0.2
        })
      });
      const data = await resp.json();
      if (!resp.ok) { lastErr = data.error?.message || "Erreur " + resp.status; continue; }
      raw = data.choices?.[0]?.message?.content || "";
      if (raw) break;
    } catch(e) { lastErr = e.message; }
  }

  loading.classList.remove("show");
  analyzeBtn.disabled = false;

  if (!raw) { showError(lastErr || "Aucun modèle disponible, réessaie."); return; }

  // Parse JSON robustly
  raw = raw.replace(/```json/g,"").replace(/```/g,"").trim();
  const m = raw.match(/\{[\s\S]*\}/);
  if (m) raw = m[0];
  let fiche;
  try { fiche = JSON.parse(raw); }
  catch {
    // Try fixing truncated JSON
    try {
      let fixed = raw;
      const o = (fixed.match(/\{/g)||[]).length, c = (fixed.match(/\}/g)||[]).length;
      for(let i=0;i<o-c;i++) fixed += "}";
      fiche = JSON.parse(fixed);
    } catch { showError("Réponse inattendue, réessaie."); return; }
  }
  showResult(fiche);
}

function showResult(f) {
  hideAll();
  const statusHTML = (f.statut||[]).map(s => `
    <div class="pill"><div class="dot ${s.couleur==="amber"?"amber":s.couleur==="rouge"?"red":""}"></div>${esc(s.label)}</div>`).join("");
  const tipsHTML = (f.conseils||[]).map((c,i) => `
    <li><div class="tip-n">${i+1}</div><span>${esc(c)}</span></li>`).join("");

  result.innerHTML = `
    <div class="result-header">
      <div class="result-emoji">${f.emoji||"🔍"}</div>
      <div>
        <div class="result-cat">${esc(f.categorie||"")}</div>
        <div class="result-name">${esc(f.nom||"")}</div>
        ${f.nom_latin?`<div class="result-latin">${esc(f.nom_latin)}</div>`:""}
      </div>
    </div>
    ${statusHTML?`<div class="pills">${statusHTML}</div>`:""}
    <div class="card"><div class="card-label"><span>📖</span> Description</div><div class="card-text">${esc(f.description||"")}</div></div>
    <div class="card"><div class="card-label"><span>🔬</span> Ce que je vois</div><div class="card-text">${esc(f.analyse||"")}</div></div>
    ${tipsHTML?`<div class="card"><div class="card-label"><span>💡</span> Conseils</div><ul class="tips">${tipsHTML}</ul></div>`:""}
    ${f.le_saviez_vous?`<div class="card"><div class="card-label"><span>🌟</span> Le saviez-vous ?</div><div class="card-text">${esc(f.le_saviez_vous)}</div></div>`:""}
    ${f.recette_ou_usage?`<div class="recipe-card"><div class="recipe-label"><span>🍽</span> Recette & Usage</div><div class="card-text">${esc(f.recette_ou_usage)}</div></div>`:""}
  `;
  result.classList.add("show");
  newBtn.style.display = "block";
  result.scrollIntoView({ behavior: "smooth", block: "start" });
}

function showError(msg) {
  hideAll();
  errorText.textContent = msg;
  error.classList.add("show");
}

function hideAll() {
  loading.classList.remove("show");
  result.classList.remove("show");
  error.classList.remove("show");
  newBtn.style.display = "none";
}

function resetAll() {
  imageB64 = ""; fileInput.value = "";
  captureZone.innerHTML = `<div class="capture-icon">📷</div><div class="capture-title">Prends ou importe une photo</div><div class="capture-sub">Plante, animal, objet, aliment, monument…<br>J'analyse tout !</div>`;
  captureZone.classList.remove("has-image");
  actions.classList.remove("show");
  hideAll();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/
/g,"<br>");
}
</script>
</body>
</html>
