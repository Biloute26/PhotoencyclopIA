<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1f0f">
<title>PhotoencyclopIA</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0d1f0f; color: #f5f0e8; min-height: 100vh; max-width: 480px; margin: 0 auto; }
header { padding: 18px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.logo { font-size: 22px; font-weight: 700; color: #c8e6c9; }
.logo span { color: #4caf52; }
.main { padding: 20px; }

/* Zone preview */
.preview-box {
  background: #1a3a1d; border: 2px dashed rgba(76,175,82,0.4);
  border-radius: 20px; min-height: 180px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center; padding: 24px;
  margin-bottom: 14px; overflow: hidden; position: relative;
}
.preview-box img { width: 100%; max-height: 260px; object-fit: cover; border-radius: 16px; display: block; }
.preview-icon { font-size: 52px; margin-bottom: 10px; }
.preview-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
.preview-sub { font-size: 13px; color: #a8c5aa; }

/* Buttons */
.btn-photo {
  width: 100%; padding: 16px; border-radius: 14px; border: none;
  background: linear-gradient(135deg, #2d6a31, #4caf52);
  color: white; font-size: 16px; font-weight: 600;
  cursor: pointer; margin-bottom: 12px; display: flex;
  align-items: center; justify-content: center; gap: 10px;
}
.btn-row { display: none; gap: 10px; margin-bottom: 12px; }
.btn-row.show { display: flex; }
.btn-change {
  flex: 1; padding: 14px; border-radius: 14px;
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
  color: #f5f0e8; font-size: 14px; cursor: pointer;
}
.btn-analyze {
  flex: 2; padding: 14px; border-radius: 14px; border: none;
  background: linear-gradient(135deg, #2d6a31, #4caf52);
  color: white; font-size: 15px; font-weight: 600; cursor: pointer;
}
.btn-analyze:disabled { opacity: 0.5; }

/* Loading */
.loading { display: none; text-align: center; padding: 30px; }
.loading.show { display: block; }
.spinner {
  width: 40px; height: 40px; border: 3px solid rgba(76,175,82,0.2);
  border-top-color: #4caf52; border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Result */
.result { display: none; }
.result.show { display: block; }
.r-header { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 14px; }
.r-emoji { font-size: 44px; }
.r-cat { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #4caf52; font-weight: 600; }
.r-name { font-size: 22px; font-weight: 700; line-height: 1.2; }
.r-latin { font-size: 13px; color: #a8c5aa; font-style: italic; }
.pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.pill { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 5px 12px; font-size: 12px; display: flex; align-items: center; gap: 5px; }
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot.g { background: #4caf52; } .dot.a { background: #e8a020; } .dot.r { background: #f44336; }
.card { background: #1a3a1d; border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #4caf52; font-weight: 600; margin-bottom: 10px; }
.card-text { font-size: 14px; line-height: 1.7; }
.tips { list-style: none; }
.tips li { display: flex; gap: 8px; font-size: 14px; line-height: 1.6; margin-bottom: 8px; }
.tip-n { width: 20px; height: 20px; background: rgba(76,175,82,0.2); border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #4caf52; margin-top: 2px; }
.recipe-card { background: linear-gradient(135deg, rgba(232,160,32,0.1), rgba(232,160,32,0.03)); border: 1px solid rgba(232,160,32,0.2); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.recipe-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #e8a020; font-weight: 600; margin-bottom: 10px; }

/* Error */
.error { display: none; }
.error.show { display: block; }
.error-box { background: rgba(244,67,54,0.1); border: 1px solid rgba(244,67,54,0.3); border-radius: 14px; padding: 20px; text-align: center; }
.error-text { font-size: 14px; color: #ff8a80; margin-top: 8px; line-height: 1.6; }
.btn-new { width: 100%; padding: 14px; border-radius: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #a8c5aa; font-size: 14px; cursor: pointer; margin-top: 4px; }
footer { text-align: center; padding: 20px; font-size: 11px; color: rgba(255,255,255,0.2); }
</style>
</head>
<body>
<header><div class="logo">Photo<span>encyclop</span>IA</div></header>
<div class="main">

  <div class="preview-box" id="previewBox">
    <div class="preview-icon">📷</div>
    <div class="preview-title">Prends ou importe une photo</div>
    <div class="preview-sub">Plante, animal, objet, aliment, monument…</div>
  </div>

  <label for="fileInput" style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;border-radius:14px;background:linear-gradient(135deg,#2d6a31,#4caf52);color:white;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:12px;">
    📷 Choisir / Prendre une photo
  </label>
  <input type="file" id="fileInput" accept="image/*" style="position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;">

  <div class="btn-row" id="btnRow">
    <button class="btn-change" id="btnChange">🔄 Changer</button>
    <button class="btn-analyze" id="btnAnalyze">🔍 Analyser</button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="font-size:16px;font-weight:600;">Analyse en cours…</p>
    <p style="font-size:13px;color:#a8c5aa;margin-top:4px;" id="loadingSub">Identification…</p>
  </div>

  <div class="error" id="error">
    <div class="error-box">
      <div style="font-size:32px">😕</div>
      <div class="error-text" id="errorText"></div>
    </div>
  </div>

  <div class="result" id="result"></div>
  <button class="btn-new" id="btnNew" style="display:none">📸 Nouvelle photo</button>

</div>
<footer>PhotoencyclopIA — OpenRouter</footer>

<script>
const PROXY = "https://photoencyclopia-proxy.widehem-olivier.workers.dev";
const MODELS = [
  "meta-llama/llama-4-maverick:free",
  "qwen/qwen2.5-vl-32b-instruct:free",
  "mistralai/mistral-small-3.1-24b-instruct:free",
  "google/gemma-3-27b-it:free"
];

let b64 = "", mime = "image/jpeg";

const previewBox = document.getElementById("previewBox");
const fileInput = document.getElementById("fileInput");
const btnPhoto = document.getElementById("btnPhoto");
const btnRow = document.getElementById("btnRow");
const btnChange = document.getElementById("btnChange");
const btnAnalyze = document.getElementById("btnAnalyze");
const loading = document.getElementById("loading");
const loadingSub = document.getElementById("loadingSub");
const result = document.getElementById("result");
const error = document.getElementById("error");
const errorText = document.getElementById("errorText");
const btnNew = document.getElementById("btnNew");

btnChange.addEventListener("click", function() { fileInput.click(); });
btnNew.addEventListener("click", reset);

fileInput.addEventListener("change", function() {
  const file = this.files[0];
  if (!file) return;
  mime = file.type || "image/jpeg";
  const reader = new FileReader();
  reader.onload = function(e) {
    b64 = e.target.result.split(",")[1];
    previewBox.innerHTML = "<img src=\"" + e.target.result + "\">";
    document.querySelector('label[for=fileInput]').style.display = 'none';
    btnRow.classList.add("show");
    hideAll();
  };
  reader.readAsDataURL(file);
});

btnAnalyze.addEventListener("click", analyze);

async function analyze() {
  if (!b64) return;
  hideAll();
  loading.classList.add("show");
  btnAnalyze.disabled = true;

  const prompt = "Analyse cette photo. Retourne UNIQUEMENT ce JSON sans rien d\'autre:\n{\"emoji\":\"X\",\"categorie\":\"type\",\"nom\":\"nom\",\"nom_latin\":\"sci\",\"statut\":[{\"label\":\"info\",\"couleur\":\"vert\"}],\"description\":\"3 phrases\",\"analyse\":\"3 phrases sur cette photo\",\"conseils\":[\"1\",\"2\",\"3\"],\"le_saviez_vous\":\"fait\",\"recette_ou_usage\":\"usage\"}";

  let raw = "", lastErr = "";
  for (let i = 0; i < MODELS.length; i++) {
    try {
      loadingSub.textContent = "Modèle " + (i+1) + "/" + MODELS.length + "…";
      const resp = await fetch(PROXY, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: MODELS[i],
          messages: [{ role: "user", content: [
            { type: "text", text: prompt },
            { type: "image_url", image_url: { url: "data:" + mime + ";base64," + b64 } }
          ]}],
          max_tokens: 700,
          temperature: 0.1
        })
      });
      const data = await resp.json();
      if (!resp.ok) { lastErr = (data.error && data.error.message) || ("Erreur " + resp.status); continue; }
      raw = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || "";
      if (raw) break;
    } catch(e) { lastErr = e.message; }
  }

  loading.classList.remove("show");
  btnAnalyze.disabled = false;

  if (!raw) { showError(lastErr || "Aucun modèle disponible, réessaie."); return; }

  raw = raw.replace(/```json/g,"").replace(/```/g,"").trim();
  const m = raw.match(/\{[\s\S]*\}/);
  if (m) raw = m[0];
  let fiche;
  try { fiche = JSON.parse(raw); }
  catch {
    try {
      const o = (raw.match(/\{/g)||[]).length, c = (raw.match(/\}/g)||[]).length;
      for(let i=0;i<o-c;i++) raw += "}";
      fiche = JSON.parse(raw);
    } catch { showError("Réponse inattendue, réessaie."); return; }
  }
  showResult(fiche);
}

function showResult(f) {
  hideAll();
  const pills = (f.statut||[]).map(function(s) {
    const dc = s.couleur === "amber" ? "a" : s.couleur === "rouge" ? "r" : "g";
    return "<div class=\"pill\"><div class=\"dot " + dc + "\"></div>" + esc(s.label) + "</div>";
  }).join("");
  const tips = (f.conseils||[]).map(function(c,i) {
    return "<li><div class=\"tip-n\">" + (i+1) + "</div><span>" + esc(c) + "</span></li>";
  }).join("");

  result.innerHTML =
    "<div class=\"r-header\"><div class=\"r-emoji\">" + (f.emoji||"🔍") + "</div><div>" +
    "<div class=\"r-cat\">" + esc(f.categorie||"") + "</div>" +
    "<div class=\"r-name\">" + esc(f.nom||"") + "</div>" +
    (f.nom_latin ? "<div class=\"r-latin\">" + esc(f.nom_latin) + "</div>" : "") +
    "</div></div>" +
    (pills ? "<div class=\"pills\">" + pills + "</div>" : "") +
    "<div class=\"card\"><div class=\"card-label\">📖 Description</div><div class=\"card-text\">" + esc(f.description||"") + "</div></div>" +
    "<div class=\"card\"><div class=\"card-label\">🔬 Ce que je vois</div><div class=\"card-text\">" + esc(f.analyse||"") + "</div></div>" +
    (tips ? "<div class=\"card\"><div class=\"card-label\">💡 Conseils</div><ul class=\"tips\">" + tips + "</ul></div>" : "") +
    (f.le_saviez_vous ? "<div class=\"card\"><div class=\"card-label\">🌟 Le saviez-vous ?</div><div class=\"card-text\">" + esc(f.le_saviez_vous) + "</div></div>" : "") +
    (f.recette_ou_usage ? "<div class=\"recipe-card\"><div class=\"recipe-label\">🍽 Recette & Usage</div><div class=\"card-text\">" + esc(f.recette_ou_usage) + "</div></div>" : "");

  result.classList.add("show");
  btnNew.style.display = "block";
}

function showError(msg) { hideAll(); errorText.textContent = msg; error.classList.add("show"); }
function hideAll() { loading.classList.remove("show"); result.classList.remove("show"); error.classList.remove("show"); btnNew.style.display = "none"; }
function reset() {
  b64 = ""; fileInput.value = "";
  previewBox.innerHTML = "<div class=\"preview-icon\">📷</div><div class=\"preview-title\">Prends ou importe une photo</div><div class=\"preview-sub\">Plante, animal, objet, aliment, monument…</div>";
  document.querySelector('label[for=fileInput]').style.display = 'flex';
  btnRow.classList.remove("show");
  hideAll();
  window.scrollTo({top:0,behavior:"smooth"});
}
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/
/g,"<br>"); }
</script>
</body>
</html>
